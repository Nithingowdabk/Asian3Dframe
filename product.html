  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        .mockup-thumb {
          width: 42px;
          height: 56px;
          object-fit: contain;
          border-radius: 8px;
          border: 2px solid transparent;
          display: block;
          margin: 0 auto;
          background: #ffffff;
        }
        .mockup-scene-tab {
          width: 42px;
          height: 56px;
          padding: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: none;
          border: none;
        }
        .mockup-scene-tab.is-active .mockup-thumb {
          border-color: var(--gold);
        }
    .page-wrap { padding: 106px 0 54px; background: #f8f8fb; min-height: 100vh; }
    .product-layout { display: grid; grid-template-columns: minmax(0, .96fr) minmax(0, 1.04fr); gap: 22px; align-items: stretch; }
    .media-card, .info-card { background: #fff; border: 1px solid rgba(0,0,0,.06); border-radius: 18px; box-shadow: var(--shadow-sm); }
    .media-card { border: 0; }
    .media-card { padding: 7px; max-width: 420px; margin: 0 auto; display: grid; grid-template-columns: minmax(0, 1fr) 64px; gap: 5px; align-items: stretch; height: 100%; }
    .main-image { width: 100%; height: 100%; border-radius: 14px; display:block; aspect-ratio: 3/4; object-fit: contain; max-height: none; background: transparent; }
    .media-slider { position: relative; overflow: hidden; border-radius: 14px; width: 100%; max-width: 100%; margin: 0; aspect-ratio: 3/4; height: 100%; min-height: 480px; }
    .media-slider-track { display: flex; width: 100%; height: 100%; transition: transform .4s ease; }
    .media-slide { min-width: 100%; height: 100%; aspect-ratio: 3/4; }
    .media-slide.mockup-slide { background: transparent; display: block; padding: 0; }
    .media-nav { position:absolute; top:50%; transform:translateY(-50%); width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,.35); background:rgba(15,15,18,.46); color:#fff; display:grid; place-items:center; z-index:4; cursor:pointer; }
    .media-nav:hover { background: rgba(15,15,18,.66); }
    .media-nav.prev { left: 10px; }
    .media-nav.next { right: 10px; }
    .media-dots { display:flex; justify-content:center; gap:7px; margin-top: 8px; }
    .media-dot { width:8px; height:8px; border-radius:50%; border:0; background:#d1d5db; }
    .media-dot.is-active { background:#111827; }
    .thumb-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(64px,1fr)); gap:8px; margin-top:12px; }
    .thumb-btn { border:1px solid rgba(0,0,0,.12); background:#fff; border-radius:10px; padding:0; overflow:hidden; cursor:pointer; aspect-ratio:3/4; }
    .thumb-btn img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb-btn.is-active { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(200,149,108,.18); }
    .info-card { padding: 22px; }
    .cat-chip { display:inline-block; background: rgba(200,149,108,.12); color: var(--gold-dark); padding: 5px 11px; border-radius: 999px; font-size: .7rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }
    .best-chip { display:none; margin-left: 8px; background: linear-gradient(135deg,var(--gold),var(--gold-dark)); color:#fff; }
    .name { font-family: var(--font-heading); font-size: clamp(1.38rem, 2.3vw, 1.95rem); line-height: 1.15; margin-bottom: 8px; color: var(--dark); }
    .price-row { display:flex; align-items:center; gap:8px; margin-bottom: 10px; }
    .price { font-size: 1.35rem; font-weight: 700; color: var(--dark); }
    .old-price { font-size: .96rem; color: #9ca3af; text-decoration: line-through; }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .product-badge {
      display: inline-flex;
